<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 640" fill="none" aria-hidden="true">
  <!-- Same base tones as workflow-dark-bg; different motif: radial + soft chart silhouette -->
  <defs>
    <linearGradient id="ovb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#161950"/>
      <stop offset="50%" stop-color="#1c2064"/>
      <stop offset="100%" stop-color="#121642"/>
    </linearGradient>
    <radialGradient id="ovGlow" cx="18%" cy="78%" r="52%">
